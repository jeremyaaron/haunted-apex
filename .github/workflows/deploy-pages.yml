name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Test and build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify README release status
        run: npm run check:readme

      - name: Run tests
        run: npm test -- --watch=false --browsers=ChromeHeadless

      - name: Build production artifact
        run: npm run build -- --configuration production --base-href /haunted-apex/

      - name: Verify production artifact
        run: |
          test -f dist/haunted-apex/browser/index.html
          grep -Fq '<base href="/haunted-apex/">' dist/haunted-apex/browser/index.html

      - name: Report artifact size
        run: du -sh dist/haunted-apex/browser

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist/haunted-apex/browser

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
